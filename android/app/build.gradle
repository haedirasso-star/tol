plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: "1"
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: "1.0.0"

android {
    namespace "com.totv.plus"
    compileSdk 35
    ndkVersion "27.0.12077973"

    signingConfigs {
        release {
            storeFile file(keystoreProperties['storeFile'] ?: 'totv_keystore.jks')
            storePassword keystoreProperties['storePassword'] ?: "Totv2026@787500"
            keyAlias keystoreProperties['keyAlias'] ?: 'totv_alias'
            keyPassword keystoreProperties['keyPassword'] ?: "Totv2026@787500"
        }
    }

    compileOptions {
        // ★ مطلوب لـ Android 14+ وللمكتبات الحديثة
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.totv.plus"
        // ★ Android 6.0 كحد أدنى — يغطي 99%+ من الأجهزة
        minSdkVersion 23
        // ★ targetSdk 35 = Android 15 — مطلوب من Google Play منذ 2024
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        resConfigs "ar", "en"

        // ★ إضافة: دعم الـ Large Screen و Foldable
        vectorDrawables {
            useSupportLibrary true
        }
    }

    splits {
        abi {
            enable true
            reset()
            // ★ arm64-v8a = معظم الهواتف الحديثة (2017+)
            // ★ armeabi-v7a = الأجهزة القديمة
            // ★ x86_64 = المحاكيات
            include "armeabi-v7a", "arm64-v8a", "x86_64"
            universalApk true
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            // ★ تفعيل التصغير للإصدار الرسمي = APK أصغر وأسرع
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
            applicationIdSuffix ".debug"
        }
    }

    bundle {
        language { enableSplit = false }
        density  { enableSplit = false }
        abi      { enableSplit = true  }
    }

    // ★ إضافة: منع تعارض المكتبات المكررة
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core-ktx:1.13.1'
            force 'androidx.appcompat:appcompat:1.7.0'
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // ★ إصدار محدّث من desugar لدعم Java 8+ APIs على Android القديم
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.multidex:multidex:2.0.1"

    // ★ Firebase BOM محدّث — يتحكم في جميع إصدارات Firebase تلقائياً
    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-analytics-ktx"
    implementation "com.google.firebase:firebase-messaging-ktx"
    implementation "com.google.firebase:firebase-firestore-ktx"
    implementation "com.google.firebase:firebase-auth-ktx"

    // ★ AndroidX Core لدعم Android 15
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"

    // ★ Leanback لـ Android TV
    implementation "androidx.leanback:leanback:1.0.0"

    // ★ WindowManager لدعم Foldable & Large screens
    implementation "androidx.window:window:1.3.0"
}
