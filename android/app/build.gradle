plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: "1"
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: "1.0.0"

android {
    namespace "com.totv.plus"

    // ★ compileSdk 35 = Android 15 (أحدث SDK مستقر مع Flutter 3.29+)
    compileSdk 35
    ndkVersion "27.0.12077973"

    signingConfigs {
        release {
            storeFile     keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : file('totv_keystore.jks')
            storePassword keystoreProperties['storePassword']
            keyAlias      keystoreProperties['keyAlias']
            keyPassword   keystoreProperties['keyPassword']
        }
    }

    compileOptions {
        // ★ Java 8+ desugaring — ضروري لـ minSdk < 26
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = "17" }

    defaultConfig {
        applicationId "com.totv.plus"

        // ★ minSdk 23 = Android 6.0
        // Firebase Auth 23.x+ يتطلب API 23 كحد أدنى
        // يغطي 98%+ من الأجهزة النشطة عالمياً (2024)
        minSdkVersion 23

        // ★ targetSdk 35 = Android 15
        // إجباري لنشر التطبيقات الجديدة في Play Store (2025+)
        targetSdkVersion 35

        versionCode    flutterVersionCode.toInteger()
        versionName    flutterVersionName
        multiDexEnabled true
        resConfigs     "ar", "en"

        // ★ كل المعماريات في APK واحد — توافق أقصى مع كل الأجهزة
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }

        vectorDrawables { useSupportLibrary true }

        // قيمة افتراضية لـ appLabel (تُستبدل حسب الـ flavor)
        manifestPlaceholders = [appLabel: "TOTV+"]
    }

    // ══════════════════════════════════════════════════════════
    //  ABI Splits — بناء APK منفصل لكل معمارية
    //  النتيجة: 4 ملفات APK من بناء واحد
    //    app-arm64-v8a-release.apk    → هواتف 2018+  (الأفضل)
    //    app-armeabi-v7a-release.apk  → هواتف قبل 2018
    //    app-x86_64-release.apk       → محاكيات Android Studio / MEmu
    //    app-release.apk              → شامل لكل الأجهزة (أكبر حجماً)
    // ══════════════════════════════════════════════════════════
    // ══════════════════════════════════════════════════════════
    //  APK واحد شامل لكل المعماريات (أكثر توافقاً مع كل الأجهزة)
    //  عُطّل التقسيم لأن APK المقسّم يُرفض على الأجهزة 64-بت فقط
    //  (الشاشات الذكية الحديثة وأندرويد 14/15).
    // ══════════════════════════════════════════════════════════
    // splits { abi { ... } }  ← مُعطّل عمداً لإنتاج APK شامل

    buildTypes {
        release {
            signingConfig signingConfigs.release
            // ★ minify=false لمنع إزالة كلاسات Firebase/Ads/Reflection
            minifyEnabled   false
            shrinkResources false
            proguardFiles   getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled   false
            shrinkResources false
        }
    }

    // ══════════════════════════════════════════════════════════
    //  Flavors: phone (عادي) + tv (شاشات ذكية / TOTV Smart)
    //  كلاهما من نفس الكود؛ التطبيق يكتشف TV تلقائياً (TVLayout).
    // ══════════════════════════════════════════════════════════
    flavorDimensions "device"
    productFlavors {
        phone {
            dimension "device"
            manifestPlaceholders = [appLabel: "TOTV+"]
        }
        tv {
            dimension "device"
            applicationIdSuffix ".tv"
            manifestPlaceholders = [appLabel: "TOTV Smart"]
        }
    }

    bundle {
        language { enableSplit = false }
        density  { enableSplit = false }
        abi      { enableSplit = true  }
    }

    // ★ توافق مع أندرويد 15 (حجم صفحة 16KB) والأجهزة الحديثة + الشاشات الذكية
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    configurations.all {
        resolutionStrategy {
            // ★ إجبار إصدارات محددة لتجنب تعارض المكتبات
            force 'androidx.core:core-ktx:1.13.1'
            force 'androidx.appcompat:appcompat:1.7.0'
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError       false
    }
}

flutter { source "../.." }

dependencies {
    // ★ Java 8+ APIs on older Android versions
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'

    // MultiDex support
    implementation "androidx.multidex:multidex:2.0.1"

    // ★ Firebase BOM — يضمن توافق كل مكتبات Firebase مع بعضها
    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-analytics-ktx"
    implementation "com.google.firebase:firebase-messaging-ktx"
    implementation "com.google.firebase:firebase-firestore-ktx"
    implementation "com.google.firebase:firebase-auth-ktx"

    // AndroidX Core
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"

    // ★ Leanback — دعم Android TV
    implementation "androidx.leanback:leanback:1.0.0"

    // ★ WindowManager — دعم الأجهزة القابلة للطي + نوافذ متعددة
    implementation "androidx.window:window:1.3.0"
}
