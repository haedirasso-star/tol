name: totv_plus
description: TOTV+ Premium Streaming App
publish_to: 'none'

# ══════════════════════════════════════════════════════
#  SINGLE SOURCE OF TRUTH FOR VERSION
#  version code = versionName digits joined: 1.0.0 → 100
# ══════════════════════════════════════════════════════
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.1
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.2
  firebase_analytics: ^11.3.6
  firebase_messaging: ^15.1.6

  # AI & Smart Services

  # Networking & Cache
  dio: ^5.7.0
  cached_network_image: ^3.4.1

  # Video
  video_player: ^2.9.2
  wakelock_plus: ^1.2.10

  # Storage & Cache
  shared_preferences: ^2.3.3

  # Downloads

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Device
  device_info_plus: ^10.1.2
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

  # Audio
  audioplayers: ^6.1.0

  # Ads & Notifications
  google_mobile_ads: ^5.2.0
  flutter_local_notifications: ^18.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
