# ══════════════════════════════════════════════════════════════
#  TOTV+ — GitHub Actions Build Configuration (Optimized Storage)
# ═══════════════════════════════════════════════════════════════

name: TOTV+ Android Release Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-release:
    name: TOTV+ Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      # ── فك تشفير الـ Keystore ──
      - name: Decode & Place Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/totv_keystore.jks
          echo "✅ Keystore placed"

      # ── إنشاء key.properties ──
      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYEOF'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=totv_keystore.jks
          KEYEOF
          echo "✅ key.properties created"

      - name: Clean & Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK (Multi-Architecture)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --tree-shake-icons

      # ── التعديل المقترح: رفع ملفات الـ APK فقط وتحديد مدة الحفظ ──
      - name: Upload APKs Only
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-Release-APKs
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 1 # سيتم حذفها من GitHub بعد 24 ساعة لتوفير المساحة

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/*.apk
