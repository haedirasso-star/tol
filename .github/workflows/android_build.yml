name: TOTV+ Android Release Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-release:
    name: TOTV+ Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Decode & Place Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/totv_keystore.jks
          echo "✅ Keystore placed"

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYEOF'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=totv_keystore.jks
          KEYEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Universal APK (All Devices)
        run: |
          flutter build apk --release \
            --tree-shake-icons

      - name: Build Split APKs (Optimized per arch)
        run: |
          flutter build apk --release \
            --split-per-abi \
            --tree-shake-icons

      - name: Upload All APKs
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-Release-APKs-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Create GitHub Release (on tag)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
