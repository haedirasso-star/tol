name: TOTV+ Build — Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Accept Android licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ─────────────────────────────────────────────────────────
      #  Universal APK — يعمل على كل الأجهزة والمحاكيات
      # ─────────────────────────────────────────────────────────
      - name: Build Universal APK (Release)
        run: |
          flutter build apk --release --no-shrink
        env:
          JAVA_OPTS: "-Xmx4096m"

      # ─────────────────────────────────────────────────────────
      #  Split APKs — حجم أصغر لكل معمارية
      #  arm64-v8a  → هواتف حديثة (أفضل أداء)
      #  armeabi-v7a → هواتف قديمة
      #  x86_64     → محاكيات (Android Studio / MEmu)
      # ─────────────────────────────────────────────────────────
      - name: Build Split APKs (Release)
        run: |
          flutter build apk --release --split-per-abi --no-shrink
        env:
          JAVA_OPTS: "-Xmx4096m"

      # ─────────────────────────────────────────────────────────
      #  تنظيم الملفات
      # ─────────────────────────────────────────────────────────
      - name: Collect and rename APKs
        run: |
          mkdir -p release_apks
          # Universal APK
          cp build/app/outputs/apk/release/app-release.apk              release_apks/TOTV-Universal.apk || true
          # Split APKs
          cp build/app/outputs/apk/release/app-arm64-v8a-release.apk              release_apks/TOTV-arm64-Phones.apk || true
          cp build/app/outputs/apk/release/app-armeabi-v7a-release.apk              release_apks/TOTV-armeabi-OldPhones.apk || true
          cp build/app/outputs/apk/release/app-x86_64-release.apk              release_apks/TOTV-x86_64-Emulator.apk || true
          ls -lh release_apks/

      # ─────────────────────────────────────────────────────────
      #  رفع النتائج
      # ─────────────────────────────────────────────────────────
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-Universal-APK
          path: release_apks/TOTV-Universal.apk
          retention-days: 30

      - name: Upload Phones APK (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-Phones-arm64
          path: release_apks/TOTV-arm64-Phones.apk
          retention-days: 30

      - name: Upload Old Phones APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-OldPhones-armeabi
          path: release_apks/TOTV-armeabi-OldPhones.apk
          retention-days: 30

      - name: Upload Emulator APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-Emulator-x86_64
          path: release_apks/TOTV-x86_64-Emulator.apk
          retention-days: 30

      - name: Upload All APKs
        uses: actions/upload-artifact@v4
        with:
          name: TOTV-All-APKs
          path: release_apks/
          retention-days: 30
